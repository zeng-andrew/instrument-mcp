instrument_type: cmw
description: R&S CMW500 宽带无线通信测试仪

# 注意：CMW500 需要先激活对应应用（LTE/WCDMA/GPRF 等）才能使用应用命令
# 应用激活通常通过前面板或 R&S 专用软件完成

model_keywords:
  - "CMW500"
  - "CMW"
  - "Rohde"
  - "ROHDE"
  - "SCHWARZ"

commands:
  - name: idn
    description: 读取仪器标识信息
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "*IDN?"

  - name: cmw_preset
    description: 恢复 CMW500 到预设状态
    annotations:
      destructiveHint: true
    params: []
    scpi_template: "*RST"

  - name: cmw_opc
    description: 等待操作完成
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "*OPC?"

  - name: cmw_tst
    description: 自检
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "*TST?"

  - name: cmw_opt
    description: 读取仪器选项列表
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "*OPT?"

  - name: cmw_stb
    description: 读取状态字节
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "*STB?"

  - name: cmw_esr
    description: 读取事件状态寄存器
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "*ESR?"

  - name: cmw_sre
    description: 读取服务请求使能寄存器
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "*SRE?"

  - name: cmw_vers
    description: 读取 SCPI 版本
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "SYST:VERS?"

  - name: cmw_get_error
    description: 读取 CMW 错误队列
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "SYST:ERR:ALL?"

  - name: cmw_clear_status
    description: 清除仪器状态
    annotations:
      destructiveHint: false
    params: []
    scpi_template: "*CLS"

  # 以下命令需要激活对应应用后才能使用
  # 应用激活通常通过 CMW 前面板或 R&S 软件完成

  - name: cmw_cell_on
    description: 打开小区信号（需先激活蜂窝应用）
    annotations:
      destructiveHint: false
    params: []
    scpi_template:
      write: "CALL:CELL:STAT ON"

  - name: cmw_cell_off
    description: 关闭小区信号
    annotations:
      destructiveHint: false
    params: []
    scpi_template:
      write: "CALL:CELL:STAT OFF"

  - name: cmw_set_lte_band
    description: 设置 LTE 工作频段（需激活 LTE 应用）
    annotations:
      destructiveHint: false
    params:
      - name: band
        type: integer
        description: LTE 频段号
        default: 1
    scpi_template:
      write: "CONF:LTE:MEAS:BAND {band}"

  - name: cmw_set_frequency
    description: 设置频率（需激活对应应用）
    annotations:
      destructiveHint: false
    params:
      - name: freq_hz
        type: number
        description: 频率（Hz）
        default: 2140000000
    scpi_template:
      write: "CONF:LTE:MEAS:FREQ {freq_hz}"

  - name: cmw_set_power
    description: 设置输出功率（需激活对应应用）
    annotations:
      destructiveHint: false
    params:
      - name: power_dbm
        type: number
        description: 输出功率（dBm）
        default: -70
    scpi_template:
      write: "CONF:LTE:MEAS:POW {power_dbm}"

  - name: cmw_set_bandwidth
    description: 设置信道带宽（需激活 LTE 应用）
    annotations:
      destructiveHint: false
    params:
      - name: bw_mhz
        type: number
        description: 带宽（MHz）
        default: 20
    scpi_template:
      write: "CONF:LTE:MEAS:BW {bw_mhz}"
