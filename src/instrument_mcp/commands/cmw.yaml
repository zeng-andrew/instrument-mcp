instrument_type: cmw
description: R&S CMW500 宽带无线通信测试仪

# 注意：CMW500 需要先通过前面板激活对应应用（LTE/WCDMA/GSM 等）
# 部分命令需要 UE 连接后才能查询到有效数据

model_keywords:
  - "CMW500"
  - "CMW"
  - "Rohde"
  - "ROHDE"
  - "SCHWARZ"

commands:
  # ─────────────────────────────────────────────
  # 基础控制命令
  # ─────────────────────────────────────────────
  - name: cmw_idn
    description: 读取仪器标识信息
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "*IDN?"

  - name: cmw_preset
    description: 恢复 CMW500 到预设状态
    annotations:
      destructiveHint: true
    params: []
    scpi_template: "*RST"

  - name: cmw_opc
    description: 等待操作完成
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "*OPC?"

  - name: cmw_cls
    description: 清除仪器状态
    annotations:
      destructiveHint: false
    params: []
    scpi_template: "*CLS"

  - name: cmw_tst
    description: 自检
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "*TST?"

  - name: cmw_opt
    description: 读取仪器选项列表
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "*OPT?"

  - name: cmw_get_error
    description: 读取 CMW 错误队列
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "SYST:ERR?"

  # ─────────────────────────────────────────────
  # 小区控制命令
  # ─────────────────────────────────────────────
  - name: cmw_cell_on
    description: 打开 LTE 小区信号
    annotations:
      destructiveHint: false
    params: []
    scpi_template:
      write: "SOURce:LTE:SIGN:CELL:STATe ON"

  - name: cmw_cell_off
    description: 关闭 LTE 小区信号
    annotations:
      destructiveHint: false
    params: []
    scpi_template:
      write: "SOURce:LTE:SIGN:CELL:STATe OFF"

  - name: cmw_cell_state
    description: 查询小区状态
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "SOURce:LTE:SIGN:CELL:STATe?"

  - name: cmw_cell_state_all
    description: 查询小区完整状态（含调整状态）
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "SOURce:LTE:SIGN:CELL:STATe:ALL?"

  # ─────────────────────────────────────────────
  # 配置命令
  # ─────────────────────────────────────────────
  # 频段/信道切换机制：手机处于 Connection Established 状态下，直接修改 Band 或
  # 下行信道号即可——仪器内部自动发起 Redirection（重定向），手机保持在同一 LTE
  # 连接内跳到新频率，无需 Handover、无需断开重连。改下行信道后上行信道自动计算。
  #   FDD: OB1~OB32, OB65~OB67, OB252, OB255    TDD: OB33~OB46    自定义: UDEFined（需选件 KS525）
  #   注意: OB252/OB255 需固件 V3.5.40+; OB29/OB32/OB67/OB252/OB255 仅用于辅载波(SCC)下行
  # 双工模式约束（已在 CMW500 固件 3.5.120 实测）：频段属于哪种双工，就必须先把 DMODe 设成对应值，
  #   否则切换会报 -221 Settings conflict。FDD 频段→DMODe FDD；TDD 频段(OB33~OB46)→DMODe TDD。
  - name: cmw_set_duplex_mode
    description: 设置 LTE 双工模式（FDD/TDD）。切到 TDD 频段(OB33~OB46)前必须先设为 TDD，否则设频段会报 -221 冲突
    annotations:
      destructiveHint: false
    params:
      - name: mode
        type: string
        description: 双工模式（FDD 或 TDD）
        default: "FDD"
    scpi_template:
      write: "CONFigure:LTE:SIGN:DMODe {mode}"

  - name: cmw_set_band
    description: "设置 LTE 频段（FDD: OB1~OB32/OB65~OB67/OB252/OB255；TDD: OB33~OB46；自定义: UDEFined）"
    annotations:
      destructiveHint: false
    params:
      - name: band
        type: string
        description: 频段标识（如 OB1, OB3, OB7, OB38, OB40, OB41）
        default: "OB1"
    scpi_template:
      write: "CONFigure:LTE:SIGN:PCC:BAND {band}"

  - name: cmw_switch_band
    description: 一键切换频段+下行信道（同一双工模式内，谐波测试循环首选：设 Band 再设 DL 信道，仪器自动 Redirection 跳频，上行信道自动计算。跨 FDD/TDD 需先调用 cmw_set_duplex_mode）
    annotations:
      destructiveHint: false
    params:
      - name: band
        type: string
        description: 频段标识（如 OB1, OB3, OB7）
        default: "OB1"
      - name: channel
        type: integer
        description: 下行信道号（EARFCN）
        default: 300
    scpi_template:
      - "CONFigure:LTE:SIGN:PCC:BAND {band}"
      - "CONFigure:LTE:SIGN:RFSettings:PCC:CHANnel:DL {channel}"

  - name: cmw_set_dl_channel
    description: 设置下行信道号
    annotations:
      destructiveHint: false
    params:
      - name: channel
        type: integer
        description: 下行信道号
        default: 300
    scpi_template:
      write: "CONFigure:LTE:SIGN:RFSettings:PCC:CHANnel:DL {channel}"

  - name: cmw_set_ul_channel
    description: 设置上行信道号
    annotations:
      destructiveHint: false
    params:
      - name: channel
        type: integer
        description: 上行信道号
        default: 18300
    scpi_template:
      write: "CONFigure:LTE:SIGN:RFSettings:PCC:CHANnel:UL {channel}"

  - name: cmw_set_bandwidth
    description: 设置 LTE 信道带宽（RB数格式：B100=20MHz, B50=10MHz, B25=5MHz, B15=3MHz, B6=1.4MHz）
    annotations:
      destructiveHint: false
    params:
      - name: rb_count
        type: string
        description: 资源块数量（B100, B50, B25, B15, B6）
        default: "B100"
    scpi_template:
      write: "CONFigure:LTE:SIGN:CELL:BANDwidth:PCC:DL {rb_count}"

  - name: cmw_set_input_attenuation
    description: 设置输入衰减
    annotations:
      destructiveHint: false
    params:
      - name: att_db
        type: number
        description: 衰减值（dB）
        default: 0
    scpi_template:
      write: "CONFigure:LTE:SIGN:RFSettings:EATTenuation:INPut {att_db}"

  - name: cmw_set_tpc_mode
    description: 设置上行功率控制模式
    annotations:
      destructiveHint: false
    params:
      - name: mode
        type: string
        description: 功率控制模式（CLOop, OPEn, MAXPower, MINPower）
        default: "CLOop"
    scpi_template:
      write: "CONFigure:LTE:SIGNaling:UL:PCC:PUSCh:TPC:SET {mode}"

  # ─────────────────────────────────────────────
  # 查询命令
  # ─────────────────────────────────────────────
  - name: cmw_query_duplex_mode
    description: 查询当前双工模式（FDD/TDD）
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "CONFigure:LTE:SIGN:DMODe?"

  - name: cmw_query_band
    description: 查询当前 LTE 频段
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "CONFigure:LTE:SIGN:PCC:BAND?"

  - name: cmw_query_dl_channel
    description: 查询下行信道号（EARFCN）
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "CONFigure:LTE:SIGN:RFSettings:PCC:CHANnel:DL?"

  - name: cmw_query_ul_channel
    description: 查询上行信道号（改下行后自动计算，可用此命令确认）
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "CONFigure:LTE:SIGN:RFSettings:PCC:CHANnel:UL?"

  - name: cmw_query_dl_frequency
    description: 查询下行频率
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "CONFigure:LTE:SIGN:RFSettings:PCC:FREQuency:DL?"

  - name: cmw_query_ul_frequency
    description: 查询上行频率
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "CONFigure:LTE:SIGN:RFSettings:PCC:FREQuency:UL?"

  # ─────────────────────────────────────────────
  # 连接控制命令
  # ─────────────────────────────────────────────
  - name: cmw_connect_ue
    description: 连接 UE（建立 RRC 连接）
    annotations:
      destructiveHint: false
    params: []
    scpi_template:
      write: "CALL:LTE:SIGN:PSWitched:ACTion CONNect"

  - name: cmw_disconnect_ue
    description: 断开 UE 连接
    annotations:
      destructiveHint: false
    params: []
    scpi_template:
      write: "CALL:LTE:SIGN:PSWitched:ACTion DISConnect"

  - name: cmw_query_connection_state
    description: 查询 UE 连接状态
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "FETCh:LTE:SIGN:PSWitched:STATe?"

  # ─────────────────────────────────────────────
  # UE 能力查询（UE Capability）
  # 数据来源：UE 在 Attach/注册时通过 RRC 上报的 UE Capability Report，仪器解析后缓存——不是实时去问 UE。
  # 前提：必须先 cmw_cell_on → 等 UE 注册成功（cmw_query_connection_state 返回 CEST/已连接）后才有有效数据；
  #       未连接时查询会超时/报错，或返回上一台 UE 的旧缓存（不可靠）。典型用途：先读 UE 支持哪些频段，
  #       再用 cmw_switch_band 只遍历支持的频段做谐波测试。
  # 注意：此命令头依据 R&S 文档补充；补充时仪器临时离线，尚未真机验证（band/duplex 命令均已 3.5.120 实测）。
  # ─────────────────────────────────────────────
  - name: cmw_query_ue_supported_bands
    description: 查询 UE 上报的支持频段（读取 Attach 时收到的 UE Capability Report 缓存）。必须先让 UE 注册成功再查，否则报错或返回上一台 UE 的旧数据
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "SENSe:LTE:SIGN:UECapability:RF:SUPPorted?"

  # ─────────────────────────────────────────────
  # 测量命令
  # ─────────────────────────────────────────────
  - name: cmw_init_measurement
    description: 触发测量
    annotations:
      destructiveHint: false
    params: []
    scpi_template:
      write: "INITiate:IMMediate"

  - name: cmw_abort_measurement
    description: 中止测量
    annotations:
      destructiveHint: false
    params: []
    scpi_template:
      write: "ABORT:LTE:MEASurement:MEValuation"

  # ─────────────────────────────────────────────
  # 路由配置
  # ─────────────────────────────────────────────
  - name: cmw_set_meas_port
    description: 设置测量信号路径/端口
    annotations:
      destructiveHint: false
    params:
      - name: scenario
        type: string
        description: 路由场景
        default: "SAL"
    scpi_template:
      write: "ROUTe:LTE:MEAS:SCENario {scenario}"

  - name: cmw_set_sign_port
    description: 设置信令信号路径/端口
    annotations:
      destructiveHint: false
    params:
      - name: scenario
        type: string
        description: 路由场景
        default: "SAL"
    scpi_template:
      write: "ROUTe:LTE:SIGN:SCENario {scenario}"

  # ─────────────────────────────────────────────
  # 文件操作
  # ─────────────────────────────────────────────
  - name: cmw_memory_catalog
    description: 查询仪器内部文件目录
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "MMEMory:CATalog?"

  - name: cmw_recall_state
    description: 从文件加载仪器状态
    annotations:
      destructiveHint: true
    params:
      - name: slot
        type: integer
        description: 状态寄存器槽位
        default: 1
      - name: filename
        type: string
        description: 文件名
        default: "default"
    scpi_template:
      write: "MMEMory:RCL {slot},\"{filename}\""
