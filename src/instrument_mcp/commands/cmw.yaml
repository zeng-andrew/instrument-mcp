instrument_type: cmw
description: R&S CMW500 宽带无线通信测试仪

model_keywords:
  - "CMW500"
  - "CMW"
  - "Rohde"
  - "ROHDE"
  - "SCHWARZ"

commands:
  - name: idn
    description: 读取仪器标识信息
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "*IDN?"

  - name: cmw_preset
    description: 恢复 CMW500 到预设状态
    annotations:
      destructiveHint: true
    params: []
    scpi_template: "*RST"

  - name: cmw_cell_on
    description: 打开小区信号（LTE/WCDMA/GSM 等）
    annotations:
      destructiveHint: false
    params: []
    scpi_template:
      write: "CALL:CELL:STAT ON"
      query: "CALL:CELL:STAT?"

  - name: cmw_cell_off
    description: 关闭小区信号
    annotations:
      destructiveHint: false
    params: []
    scpi_template:
      write: "CALL:CELL:STAT OFF"
      query: "CALL:CELL:STAT?"

  - name: cmw_set_lte_band
    description: 设置 LTE 工作频段
    annotations:
      destructiveHint: false
    params:
      - name: band
        type: integer
        description: LTE 频段号（如 1, 3, 7, 38, 40, 41 等）
        default: 1
    scpi_template:
      write: "CONF:LTE:MEAS:BAND {band}"
      query: "CONF:LTE:MEAS:BAND?"

  - name: cmw_set_frequency
    description: 设置下行链路中心频率
    annotations:
      destructiveHint: false
    params:
      - name: freq_hz
        type: number
        description: 频率（Hz）
        default: 2140000000
    scpi_template:
      write: "CONF:LTE:MEAS:FREQ {freq_hz}"
      query: "CONF:LTE:MEAS:FREQ?"

  - name: cmw_set_power
    description: 设置小区输出功率电平
    annotations:
      destructiveHint: false
    params:
      - name: power_dbm
        type: number
        description: 输出功率（dBm）
        default: -70
    scpi_template:
      write: "CONF:LTE:MEAS:POW {power_dbm}"
      query: "CONF:LTE:MEAS:POW?"

  - name: cmw_set_bandwidth
    description: 设置 LTE 信道带宽
    annotations:
      destructiveHint: false
    params:
      - name: bw_mhz
        type: number
        description: 带宽（MHz）：1.4, 3, 5, 10, 15, 20
        default: 20
    scpi_template:
      write: "CONF:LTE:MEAS:BW {bw_mhz}"
      query: "CONF:LTE:MEAS:BW?"

  - name: cmw_read_power
    description: 读取 UE 上行发射功率（需 UE 已连接）
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "READ:LTE:MEAS:MEValuation:MOD:UL:POW:AVER?"

  - name: cmw_read_evm
    description: 读取 UE 上行 EVM（误差向量幅度）
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "READ:LTE:MEAS:MEValuation:MOD:UL:EVM:ALL:AVER?"

  - name: cmw_read_aclr
    description: 读取 UE 上行 ACLR（邻道泄漏比）
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "READ:LTE:MEAS:MEValuation:MOD:UL:ACLR:AVER?"

  - name: cmw_read_ber
    description: 读取误码率（BER）
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "READ:LTE:MEAS:BLER:RATe?"

  - name: cmw_read_throughput
    description: 读取吞吐量
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "READ:LTE:MEAS:MEValuation:THRoughput?"

  - name: cmw_set_tx_port
    description: 设置射频输出口
    annotations:
      destructiveHint: false
    params:
      - name: port
        type: string
        description: 端口（RF1C, RF1O, RF2C, RF2O, RF3C, RF3O, RF4C）
        default: "RF1C"
    scpi_template:
      write: "ROUT:LTE:MEAS:SCENario:SAL {port}"
      query: "ROUT:LTE:MEAS:SCENario:SAL?"

  - name: cmw_get_error
    description: 读取 CMW 错误队列
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "SYST:ERR:ALL?"

  - name: cmw_opc
    description: 等待操作完成
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "*OPC?"
