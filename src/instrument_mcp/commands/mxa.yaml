instrument_type: mxa
description: Keysight MXA N9020A / N9010A / EXA 等 X 系列频谱仪

# 型号识别：连接后读取 *IDN? 匹配关键字
model_keywords:
  - "N9020A"
  - "N9010A"
  - "N9000A"
  - "MXA"
  - "EXA"

commands:
  # ─────────────────────────────────────────────
  # 基础控制命令
  # ─────────────────────────────────────────────
  - name: mxa_idn
    description: 读取仪器标识信息（制造商、型号、序列号、固件版本）
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "*IDN?"

  - name: mxa_preset
    description: 恢复仪器到预设状态（*RST），会清除所有当前设置和测量数据
    annotations:
      destructiveHint: true
      readOnlyHint: false
    params: []
    scpi_template: "*RST"

  - name: mxa_opc
    description: 等待操作完成
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "*OPC?"

  - name: mxa_wai
    description: 等待所有挂起操作完成后再执行后续命令（*WAI，用于谐波等多频段测量的时序同步）
    annotations:
      readOnlyHint: true
    params: []
    scpi_template: "*WAI"

  - name: mxa_cls
    description: 清除仪器状态（*CLS）
    annotations:
      destructiveHint: false
    params: []
    scpi_template: "*CLS"

  - name: mxa_get_error
    description: 读取仪器错误队列
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "SYST:ERR?"

  # ─────────────────────────────────────────────
  # 频率设置命令
  # ─────────────────────────────────────────────
  - name: mxa_set_frequency
    description: 设置中心频率和频率扫宽
    annotations:
      destructiveHint: false
    params:
      - name: center_hz
        type: number
        description: 中心频率，单位 Hz（如 1e9 = 1GHz）
        default: 1000000000
      - name: span_hz
        type: number
        description: 频率扫宽，单位 Hz（如 1e6 = 1MHz，0 = 零扫宽）
        default: 1000000
    scpi_template:
      - "FREQ:CENT {center_hz}"
      - "FREQ:SPAN {span_hz}"

  - name: mxa_set_freq_start_stop
    description: 设置起始和终止频率
    annotations:
      destructiveHint: false
    params:
      - name: start_hz
        type: number
        description: 起始频率（Hz）
        default: 900000000
      - name: stop_hz
        type: number
        description: 终止频率（Hz）
        default: 1100000000
    scpi_template:
      - "FREQ:STAR {start_hz}"
      - "FREQ:STOP {stop_hz}"

  - name: mxa_query_frequency
    description: 查询频率参数
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "FREQ:CENT?"

  # ─────────────────────────────────────────────
  # 带宽设置命令
  # ─────────────────────────────────────────────
  - name: mxa_set_rbw
    description: 设置分辨率带宽（RBW）
    annotations:
      destructiveHint: false
    params:
      - name: rbw_hz
        type: number
        description: RBW 值，单位 Hz（-1 表示自动）
        default: -1
    scpi_template:
      write: "BAND:RES {rbw_hz}"

  - name: mxa_set_vbw
    description: 设置视频带宽（VBW）
    annotations:
      destructiveHint: false
    params:
      - name: vbw_hz
        type: number
        description: VBW 值，单位 Hz（-1 表示自动）
        default: -1
    scpi_template:
      write: "BAND:VID {vbw_hz}"

  # ─────────────────────────────────────────────
  # 幅度设置命令
  # ─────────────────────────────────────────────
  - name: mxa_set_ref_level
    description: 设置参考电平
    annotations:
      destructiveHint: false
    params:
      - name: level_dbm
        type: number
        description: 参考电平值，单位 dBm
        default: 0
    scpi_template: "DISP:WIND:TRAC:Y:RLEV {level_dbm}"

  - name: mxa_set_attenuation
    description: 设置输入衰减器
    annotations:
      destructiveHint: false
    params:
      - name: att_db
        type: number
        description: 衰减值 dB（-1 表示自动）
        default: -1
    scpi_template: "POW:ATT {att_db}"

  - name: mxa_optimize_range
    description: 优化功率范围（自动调整衰减和参考电平）
    annotations:
      destructiveHint: false
    params: []
    scpi_template: "POW:RANG:OPT IMM"

  - name: mxa_set_correction_offset
    description: 设置幅度修正偏移（补偿电缆线损/增益，正值补偿损耗）
    annotations:
      destructiveHint: false
    params:
      - name: offset_db
        type: number
        description: 修正偏移值（dB），如 10 表示补偿 10dB 线损
        default: 0
    scpi_template: "SENS:CORR:OFFS {offset_db}"

  # ─────────────────────────────────────────────
  # 扫描控制命令
  # ─────────────────────────────────────────────
  - name: mxa_sweep_single
    description: 执行单次扫描并等待完成
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      write: "INIT:CONT OFF"

  - name: mxa_sweep_continuous
    description: 设置为连续扫描模式
    annotations:
      destructiveHint: false
    params: []
    scpi_template: "INIT:CONT ON"

  - name: mxa_sweep_imm
    description: 立即触发单次扫描
    annotations:
      destructiveHint: false
    params: []
    scpi_template: "INIT:IMM"

  - name: mxa_set_sweep_points
    description: 设置扫描点数
    annotations:
      destructiveHint: false
    params:
      - name: points
        type: integer
        description: 扫描点数
        default: 1001
    scpi_template: "SWE:POIN {points}"

  - name: mxa_query_sweep_time
    description: 查询扫描时间
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "SWE:TIME?"

  - name: mxa_set_sweep_time_auto
    description: 设置扫描时间自动/手动
    annotations:
      destructiveHint: false
    params:
      - name: state
        type: string
        description: 自动开关（ON, OFF）
        default: "ON"
    scpi_template: "SWE:TIME:AUTO {state}"

  - name: mxa_sweep_restart
    description: 重新开始一次测量/扫描（INIT:REST，重启单次扫描或平均累积）
    annotations:
      destructiveHint: false
    params: []
    scpi_template: "INIT:REST"

  # ─────────────────────────────────────────────
  # 标记操作命令
  # ─────────────────────────────────────────────
  - name: mxa_peak_search
    description: 执行峰值搜索并返回峰值幅度
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      write: "CALC:MARK:MAX"

  - name: mxa_peak_next
    description: 搜索下一个峰值
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      write: "CALC:MARK:MAX:NEXT"

  - name: mxa_peak_left
    description: 搜索左侧峰值
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      write: "CALC:MARK:MAX:LEFT"

  - name: mxa_peak_right
    description: 搜索右侧峰值
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      write: "CALC:MARK:MAX:RIGH"

  - name: mxa_read_marker_y
    description: 读取当前标记点的幅度值
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "CALC:MARK:Y?"

  - name: mxa_read_marker_x
    description: 读取当前标记点的频率值
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "CALC:MARK:X?"

  - name: mxa_marker_off
    description: 关闭所有标记点
    annotations:
      destructiveHint: false
    params: []
    scpi_template: "CALC:MARK:AOFF"

  - name: mxa_marker_table_on
    description: 打开标记表显示
    annotations:
      destructiveHint: false
    params: []
    scpi_template: "CALC:MARK:TABL ON"

  # ─────────────────────────────────────────────
  # 迹线操作命令
  # ─────────────────────────────────────────────
  - name: mxa_read_trace
    description: 读取当前迹线的数据点（ASCII 格式）
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "TRAC:DATA? TRACE1"

  - name: mxa_set_trace_mode
    description: 设置迹线模式
    annotations:
      destructiveHint: false
    params:
      - name: mode
        type: string
        description: 迹线模式（WRITe, MAXHold, MINHold, VIEW, BLANk）
        default: "WRITE"
    scpi_template: "TRAC:TYPE {mode}"

  - name: mxa_set_detector
    description: 设置检波器类型
    annotations:
      destructiveHint: false
    params:
      - name: detector
        type: string
        description: 检波器类型（NORMAL, AVERAGE, PEAK, NEGATIVE, SAMPLE）
        default: "NORMAL"
    scpi_template: "DET:TRAC1 {detector}"

  - name: mxa_set_averaging
    description: 设置平均次数
    annotations:
      destructiveHint: false
    params:
      - name: count
        type: integer
        description: 平均次数（1-10000，1=关闭平均）
        default: 1
    scpi_template: "AVER:COUN {count}"

  - name: mxa_set_average_type
    description: 设置平均类型
    annotations:
      destructiveHint: false
    params:
      - name: type
        type: string
        description: 平均类型（RMS, LOG, SCALar）
        default: "RMS"
    scpi_template: "AVER:TYPE {type}"

  # ─────────────────────────────────────────────
  # 谐波测量命令（HARMonics）
  # ─────────────────────────────────────────────
  - name: mxa_select_sa
    description: 选择频谱分析模式（Spectrum Analyzer）
    annotations:
      destructiveHint: false
    params: []
    scpi_template: "INST:SEL SA"

  - name: mxa_config_harmonics
    description: 配置谐波测量模式
    annotations:
      destructiveHint: false
    params: []
    scpi_template: "CONFigure:HARMonics"

  - name: mxa_set_harm_bw
    description: 设置谐波测量带宽
    annotations:
      destructiveHint: false
    params:
      - name: bw_khz
        type: number
        description: 带宽值（kHz）
        default: 10
    scpi_template: "HARM:BWID {bw_khz} kHz"

  - name: mxa_set_harm_number
    description: 设置谐波数量
    annotations:
      destructiveHint: false
    params:
      - name: number
        type: integer
        description: 谐波数量（1-10）
        default: 7
    scpi_template: "HARM:NUMB {number}"

  - name: mxa_set_harm_trace_type
    description: 设置谐波迹线类型
    annotations:
      destructiveHint: false
    params:
      - name: type
        type: string
        description: 迹线类型（WRIT, MAXHold）
        default: "WRIT"
    scpi_template: "HARM:TRAC:TYPE {type}"

  - name: mxa_set_harm_average
    description: 设置谐波平均
    annotations:
      destructiveHint: false
    params:
      - name: state
        type: string
        description: 平均开关（OFF, ON）
        default: "OFF"
    scpi_template: "HARM:AVER {state}"

  - name: mxa_set_harm_average_count
    description: 设置谐波平均次数
    annotations:
      destructiveHint: false
    params:
      - name: count
        type: integer
        description: 平均次数
        default: 10
    scpi_template: "HARM:AVER:COUN {count}"

  - name: mxa_set_harm_sweep_auto
    description: 设置谐波扫描时间自动
    annotations:
      destructiveHint: false
    params: []
    scpi_template: "HARM:SWE:AUTO ON"

  - name: mxa_set_harm_sweep_dwell
    description: 设置谐波扫描驻留时间
    annotations:
      destructiveHint: false
    params:
      - name: dwell_us
        type: integer
        description: 驻留时间（微秒）
        default: 100
    scpi_template: "HARM:SWE {dwell_us} us"

  - name: mxa_set_harm_trigger
    description: 设置谐波触发源
    annotations:
      destructiveHint: false
    params:
      - name: source
        type: string
        description: 触发源（IMM, EXT, LINE）
        default: "IMM"
    scpi_template: "TRIG:HARM:SOUR {source}"

  - name: mxa_fetch_harmonics
    description: 读取谐波幅度值（返回 10 个值，H1 为 dBm，其余为 dBc）
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "FETCh:HARMonics:AMPLitude:ALL?"

  # ─────────────────────────────────────────────
  # 谐波测量 - 方法一：一键式测量（MEASure，自动完成 配置->触发->返回）
  # ─────────────────────────────────────────────
  - name: mxa_meas_harm_amplitude
    description: 一键式测量并返回所有谐波幅度（MEASure 自动完成 配置->触发->读取，H1 为 dBm，其余为 dBc）
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "MEASure:HARMonics:AMPLitude:ALL?"

  - name: mxa_meas_harm_distortion
    description: 一键式测量并返回总谐波失真 THD（MEASure 自动完成 配置->触发->读取）
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "MEASure:HARMonics:DISTortion?"

  # ─────────────────────────────────────────────
  # 谐波测量 - 方法二：读取式测量（READ，触发一次新测量并返回）
  # ─────────────────────────────────────────────
  - name: mxa_read_harm_amplitude
    description: 触发一次新测量并返回所有谐波幅度（READ，需已切换到谐波模式）
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "READ:HARMonics:AMPLitude:ALL?"

  - name: mxa_read_harm_distortion
    description: 触发一次新测量并返回总谐波失真 THD（READ，需已切换到谐波模式）
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "READ:HARMonics:DISTortion?"

  # ─────────────────────────────────────────────
  # 谐波测量 - 方法三：三步曲控制（CONFigure->INITiate->FETCh，最灵活）
  # CONFigure:HARMonics 见上方 mxa_config_harmonics
  # ─────────────────────────────────────────────
  - name: mxa_init_harmonics
    description: 初始化/触发一次谐波测量（三步曲第二步，不返回数据，配合 FETCh 提取结果）
    annotations:
      destructiveHint: false
    params: []
    scpi_template: "INITiate:HARMonics"

  - name: mxa_fetch_harm_fundamental
    description: 提取基波信息（基波频率/幅度，不触发新测量）
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "FETCh:HARMonics:FUNDamental?"

  - name: mxa_fetch_harm_distortion
    description: 提取总谐波失真 THD（百分比或 dBc，不触发新测量）
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "FETCh:HARMonics:DISTortion?"

  - name: mxa_fetch_harm_amplitude_n
    description: 提取特定次谐波的幅度（n=2 表示二次谐波，n=3 表示三次谐波，不触发新测量）
    annotations:
      readOnlyHint: true
    params:
      - name: n
        type: integer
        description: 谐波次数（2 表示二次谐波，3 表示三次谐波，依此类推）
        default: 2
    scpi_template:
      query: "FETCh:HARMonics:AMPLitude{n}?"

  - name: mxa_fetch_harm_frequency
    description: 提取所有谐波的频率列表（不触发新测量）
    annotations:
      readOnlyHint: true
    params: []
    scpi_template:
      query: "FETCh:HARMonics:FREQuency:ALL?"

  - name: mxa_fetch_harm_frequency_n
    description: 提取特定次谐波的频率（n=2 表示二次谐波，可用于验证谐波是否出现在预期频点，不触发新测量）
    annotations:
      readOnlyHint: true
    params:
      - name: n
        type: integer
        description: 谐波次数（2 表示二次谐波，3 表示三次谐波，依此类推）
        default: 2
    scpi_template:
      query: "FETCh:HARMonics:FREQuency{n}?"

  - name: mxa_fetch_harm_n
    description: 提取特定次谐波的综合数据（n=2 表示二次谐波，不触发新测量）
    annotations:
      readOnlyHint: true
    params:
      - name: n
        type: integer
        description: 谐波次数（2 表示二次谐波，3 表示三次谐波，依此类推）
        default: 2
    scpi_template:
      query: "FETCh:HARMonics{n}?"

  # ─────────────────────────────────────────────
  # 峰值表谐波测量（Peak Table）
  # 一次宽频扫描 + 一次读取，避开列表扫描多次跳频的总线超时；命令已在 N9020A(MXA) A.17.05 实测验证。
  # ★两套独立机制（实测确认）：
  #   1) 屏幕峰值表显示：CALC:MARK:PEAK:*（TABL:STAT / SORT / THReshold[:STATe] / EXCursion[:STATe]），只影响屏幕。
  #   2) 数据读取：CALC:DATA:PEAK? <门限>,<显露度>[,<排序>] —— 门限+显露度必填（缺则 -109 Missing parameter），
  #      排序可选（省略时默认 AMPL 按幅度降序，且【不跟随】1) 里 CALC:MARK:PEAK:SORT 的屏幕状态）。
  #   读出顺序只由查询自带的 sort 参数决定；与屏幕排序互不影响。人工对着屏幕核对时，屏幕(1)与查询(2)要设成相同的门限/显露度/排序。
  # 返回格式：<峰数>,<amp1>,<freq1>,<amp2>,<freq2>,...（首位为峰数，之后每对“幅度 dBm 在前、频率 Hz 在后”）
  # 最简读数：select_sa -> set_freq_start_stop [-> set_rbw] -> sweep_single -> sweep_imm -> opc -> read_peak_table(门限,显露度,排序)
  # 给人看屏幕：另加 peak_table_on + set_peak_sort + set_peak_threshold/excursion（均设成与读数一致）
  # ─────────────────────────────────────────────
  - name: mxa_peak_table_on
    description: 打开峰值表显示（屏幕列出所有峰）
    annotations:
      destructiveHint: false
    params: []
    scpi_template: "CALC:MARK:PEAK:TABL:STAT ON"

  - name: mxa_set_peak_sort
    description: 单独设置峰值表（屏幕显示）的排序方式。FREQ=按频率升序，AMPL=按幅度降序（实测）。仅影响屏幕峰值表；不改变 mxa_read_peak_table(CALC:DATA:PEAK?) 读出数据的顺序——那个由该查询自带的 sort 参数决定（省略默认 AMPL）。
    annotations:
      destructiveHint: false
    params:
      - name: sort
        type: string
        description: 排序方式（FREQ 按频率升序，AMPL 按幅度降序）
        default: "FREQ"
    scpi_template: "CALC:MARK:PEAK:SORT {sort}"

  - name: mxa_set_peak_threshold
    description: 设置峰值表最低幅度门限（dBm），过滤底噪，仅记录高于该值的峰
    annotations:
      destructiveHint: false
    params:
      - name: threshold_dbm
        type: number
        description: 幅度门限（dBm），如 -70 表示仅记录大于 -70dBm 的峰值
        default: -70
    scpi_template: "CALC:MARK:PEAK:THReshold {threshold_dbm}"

  - name: mxa_enable_peak_threshold
    description: 启用峰值表幅度门限（CALC:MARK:PEAK:THReshold:STATe ON）。配合 mxa_set_peak_threshold 使用；不启用时屏幕峰值表会忽略门限、列出全部峰，导致与 mxa_read_peak_table 读数对不上
    annotations:
      destructiveHint: false
    params: []
    scpi_template: "CALC:MARK:PEAK:THReshold:STATe ON"

  - name: mxa_set_peak_excursion
    description: 设置峰值显露度（dB），峰需比周围高出该值才被记录，过滤毛刺
    annotations:
      destructiveHint: false
    params:
      - name: excursion_db
        type: number
        description: 显露度（dB），如 5 表示峰必须比周围高 5dB
        default: 5
    scpi_template: "CALC:MARK:PEAK:EXCursion {excursion_db}"

  - name: mxa_enable_peak_excursion
    description: 启用峰值显露度过滤（CALC:MARK:PEAK:EXCursion:STATe ON）。配合 mxa_set_peak_excursion 使用；不启用时屏幕不按显露度过滤毛刺
    annotations:
      destructiveHint: false
    params: []
    scpi_template: "CALC:MARK:PEAK:EXCursion:STATe ON"

  - name: mxa_read_peak_table
    description: 读取峰值表数据（带参数查询）。门限+显露度必填（缺任一报 -109），sort 可选（省略默认 AMPL 按幅度降序，不跟随 mxa_set_peak_sort 的屏幕排序状态）。返回 <峰数>,<amp1>,<freq1>,<amp2>,<freq2>,...（幅度 dBm 在前，频率 Hz 在后）
    annotations:
      readOnlyHint: true
    params:
      - name: threshold_dbm
        type: number
        description: 幅度门限（dBm），仅返回高于该值的峰
        default: -70
      - name: excursion_db
        type: number
        description: 峰值显露度（dB）
        default: 6
      - name: sort
        type: string
        description: 排序方式（FREQ 按频率升序，AMPL 按幅度降序）
        default: "FREQ"
    scpi_template:
      query: "CALC:DATA:PEAK? {threshold_dbm},{excursion_db},{sort}"

  # ─────────────────────────────────────────────
  # 状态保存/调用
  # ─────────────────────────────────────────────
  - name: mxa_save_state
    description: 保存仪器状态到寄存器
    annotations:
      destructiveHint: false
    params:
      - name: slot
        type: integer
        description: 寄存器槽位（1-10）
        default: 1
    scpi_template: "*SAV {slot}"

  - name: mxa_recall_state
    description: 从寄存器调用仪器状态
    annotations:
      destructiveHint: true
    params:
      - name: slot
        type: integer
        description: 寄存器槽位（1-10）
        default: 1
    scpi_template: "*RCL {slot}"
